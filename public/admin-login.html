<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>Mitvegyek.ai – Admin belépés</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#f3f4f6;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width: min(420px, 100%);
      background:#fff;
      border-radius:14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      padding:18px;
    }
    h1{ margin:0 0 10px 0; font-size:18px; }
    p{ margin:0 0 14px 0; font-size:13px; color:#4b5563; line-height:1.45; }
    label{ display:block; font-size:12px; color:#4b5563; margin:10px 0 4px; }
    input{
      width:100%;
      box-sizing:border-box;
      border-radius:10px;
      border:1px solid #d1d5db;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    input:focus{
      border-color:#2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }
    button{
      width:100%;
      margin-top:12px;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:10px 14px;
      background:#2563eb;
      color:#fff;
      font-size:14px;
      font-weight:600;
    }
    button:hover{ background:#1d4ed8; }
    .err{ margin-top:10px; font-size:13px; color:#b91c1c; }
    .ok{ margin-top:10px; font-size:13px; color:#166534; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin belépés</h1>
    <p>Jelentkezz be, és utána megnyílik az admin felület.</p>

    <label for="user">Felhasználónév</label>
    <input id="user" autocomplete="username" />

    <label for="pass">Jelszó</label>
    <input id="pass" type="password" autocomplete="current-password" />

    <button id="btn">Belépés</button>

    <div id="msg" class=""></div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function setMsg(text, ok) {
      msg.textContent = text || "";
      msg.className = ok === true ? "ok" : ok === false ? "err" : "";
    }

    async function login() {
      setMsg("", null);
      btn.disabled = true;

      const user = document.getElementById("user").value || "";
      const pass = document.getElementById("pass").value || "";

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user, pass })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || "Belépés sikertelen.");
        }

        localStorage.setItem("mv_admin_token", data.token);
        setMsg("Sikeres belépés ✔", true);

        // ✅ maradjon kicsit tovább látható a zöld üzenet
        setTimeout(() => {
          window.location.href = "/admin.html";
        }, 1600);
      } catch (e) {
        setMsg(e.message, false);
      } finally {
        // ha sikeres volt, úgyis átirányítunk, ne engedjük vissza a gombot
        if (!msg.classList.contains("ok")) btn.disabled = false;
      }

    }

    btn.addEventListener("click", login);

    // Enterrel is lehessen
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
